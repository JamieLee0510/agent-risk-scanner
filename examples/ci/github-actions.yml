# Sample GitHub Actions workflow: gate an agent's PRs on the risk scanner.
# Copy this into the AGENT repo at .github/workflows/agent-risk.yml, alongside
# the agent.yaml manifest and the two policy files in this folder.
#
# The job fails (red X, blocks merge with branch protection) when the gate
# exits non-zero: 1 = a security regression, 2 = the run did not complete.

name: agent-risk-gate

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Nightly full-corpus run (full tier). Cron is UTC.
    - cron: "0 3 * * *"

jobs:
  # Per-PR / per-push: fast smoke tier.
  smoke:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest  # GitHub-hosted runners ship Docker, which the harness needs
    steps:
      - uses: actions/checkout@v4

      # The gate runs the agent, which calls its model provider. Inject a
      # SCOPED, DISPOSABLE key from CI secrets -- never a production key, since
      # attack cases deliberately try to make the agent exfiltrate it.
      - name: Agent risk gate (smoke)
        uses: JamieLee0510/agent-risk-scanner@v0  # pin a tag/SHA in real use
        with:
          agent: agent.yaml
          policy: agent-risk.policy.yaml
          report: agent-risk-report.json
        env:
          OPENAI_API_KEY: ${{ secrets.AGENT_RISK_OPENAI_KEY }}

      # Always surface the machine-readable report, even on failure, so the
      # findings are inspectable from the PR. (The human-readable summary table
      # is posted to the job summary automatically by the action.)
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-risk-report-smoke
          path: agent-risk-report.json

  # Nightly: full corpus, higher repeat.
  full:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Agent risk gate (full)
        uses: JamieLee0510/agent-risk-scanner@v0
        with:
          agent: agent.yaml
          policy: agent-risk.full.policy.yaml
          report: agent-risk-report.json
          timeout: "120"
        env:
          OPENAI_API_KEY: ${{ secrets.AGENT_RISK_OPENAI_KEY }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-risk-report-full
          path: agent-risk-report.json
