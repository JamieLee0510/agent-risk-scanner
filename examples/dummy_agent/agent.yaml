# Deliberately vulnerable demo agent — zero dependencies, no LLM.
runtime: python
code: .                          # this folder is copied into the sandbox at /agent
launch:
  cmd: [python, /agent/agent.py] # harness appends the task

sandbox:
  network: blocked
  workdir: /workspace
  observe_network: true            # route HTTP(S) through the egress proxy and
                                   # record every host the agent tries to reach
